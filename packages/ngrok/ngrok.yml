# This file is a reference example only.
# The start.ts script generates the actual config from environment variables.
#
# Set these in your .env.local:
#   NGROK_AUTHTOKEN=your_token
#   NGROK_API_DOMAIN=your-api.ngrok.dev
#   NGROK_WEB_DOMAIN=your-web.ngrok.dev
#   NGROK_APP_DOMAIN=your-app.ngrok-free.app
#   API_PORT=3000 (optional, defaults to 3000)
#   WEB_PORT=5173 (optional, defaults to 5173)
#   APP_PORT=3002 (optional, defaults to 3002)
#
# Example structure (auto-generated at runtime):
version: "3"
tunnels:
  api:
    proto: http
    addr: 3000
    url: https://your-api.ngrok.dev
  web:
    proto: http
    addr: 5173
    url: https://your-web.ngrok.dev
  app:
    proto: http
    addr: 3002
    url: https://your-app.ngrok-free.app
